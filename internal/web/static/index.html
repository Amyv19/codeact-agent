<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeAct Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #15102b;
    --panel: #1c1638;
    --bubble-user: #5b4fe8;
    --bubble-agent: #211c40;
    --chip-bg: #171331;
    --border: #322a55;
    --text: #ece9fb;
    --muted: #8a82b8;
    --ok: #4ade80;
    --err: #fb7185;
    --gradient: linear-gradient(90deg, #4f46e5 0%, #a855f7 45%, #f59e0b 75%, #ec4899 100%);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .bg-anim {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  .bg-anim .blob {
    position: absolute; border-radius: 50%; filter: blur(90px); opacity: .32;
  }
  .bg-anim .blob1 { width: 460px; height: 460px; background: #4f46e5; top: -12%; left: -10%; animation: drift1 22s ease-in-out infinite; }
  .bg-anim .blob2 { width: 400px; height: 400px; background: #ec4899; bottom: -16%; right: -8%; animation: drift2 26s ease-in-out infinite; }
  .bg-anim .blob3 { width: 340px; height: 340px; background: #f59e0b; top: 38%; left: 58%; animation: drift3 30s ease-in-out infinite; }
  .bg-anim .blob4 { width: 300px; height: 300px; background: #a855f7; top: 65%; left: 8%; animation: drift1 24s ease-in-out infinite reverse; }
  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(70px, 50px) scale(1.1); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-60px, -70px) scale(1.08); }
  }
  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-50px, 40px) scale(1.15); }
  }

  .topbar { position: relative; z-index: 1; height: 6px; background: var(--gradient); flex-shrink: 0; }
  header {
    position: relative; z-index: 1;
    padding: .9rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: .7rem;
    flex-shrink: 0;
  }
  h1 { font-size: 1.05rem; font-weight: 700; margin: 0; }
  #meta { color: var(--muted); font-size: .75rem; font-family: "JetBrains Mono", ui-monospace, Consolas, monospace; }

  #chat {
    position: relative; z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { display: flex; gap: .6rem; max-width: 88%; animation: msgIn .28s cubic-bezier(.2,.8,.2,1) both; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.agent { align-self: flex-start; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: var(--gradient);
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem; font-weight: 700; color: #fff;
  }
  .bubble-wrap { display: flex; flex-direction: column; gap: .25rem; }
  .msg.user .bubble-wrap { align-items: flex-end; }
  .bubble {
    padding: .65rem .9rem;
    border-radius: 16px;
    font-size: .92rem;
    line-height: 1.45;
  }
  .msg.user .bubble { background: var(--bubble-user); color: #fff; border-radius: 16px 16px 4px 16px; }
  .msg.agent .bubble { background: var(--bubble-agent); color: var(--text); border-radius: 16px 16px 16px 4px; }
  .msg.agent .bubble.final { background: #163826; border: 1px solid #1f5436; }
  .msg.agent .bubble.failed { background: #3a1620; border: 1px solid #5c1f2c; }
  .timestamp { font-size: .68rem; color: var(--muted); padding: 0 .3rem; }

  .step-label {
    font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); margin-bottom: .4rem; display: flex; align-items: center; gap: .4rem;
  }
  .dot-status { width: 7px; height: 7px; border-radius: 50%; }
  .dot-status.ok { background: var(--ok); }
  .dot-status.err { background: var(--err); }
  .code-chip {
    background: var(--chip-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .6rem .7rem;
    font-family: "JetBrains Mono", ui-monospace, Consolas, "SF Mono", monospace;
    font-size: .8rem;
    white-space: pre-wrap; word-break: break-word;
    margin-bottom: .5rem;
    color: #c7d2fe;
  }
  .feedback { font-family: "JetBrains Mono", ui-monospace, Consolas, monospace; font-size: .8rem; white-space: pre-wrap; word-break: break-word; }
  .feedback.ok { color: var(--ok); }
  .feedback.err { color: var(--err); }

  .tok-comment { color: #6b7280; font-style: italic; }
  .tok-string { color: #4ade80; }
  .tok-keyword { color: #c084fc; font-weight: 600; }
  .tok-builtin { color: #60a5fa; }
  .tok-number { color: #f59e0b; }

  .empty-state {
    margin: auto 0; text-align: center; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: .9rem;
    animation: msgIn .35s ease-out both;
  }
  .empty-state p { margin: 0; font-size: .9rem; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; max-width: 560px; }
  .chip {
    background: var(--chip-bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: .5rem 1rem; font-size: .82rem; cursor: pointer;
    font-family: inherit; transition: transform .15s, background .15s, border-color .15s;
  }
  .chip:hover { background: var(--bubble-agent); border-color: var(--bubble-user); transform: translateY(-2px); }

  .typing .bubble { display: flex; gap: 4px; padding: .8rem 1rem; align-items: center; }
  .typing .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.1s infinite; }
  .typing .dot:nth-child(2) { animation-delay: .15s; }
  .typing .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-4px); opacity: 1; } }

  .streaming-text { white-space: pre-wrap; word-break: break-word; font-size: .85rem; line-height: 1.5; }
  .streaming-text::after { content: '▋'; animation: cur 1s step-end infinite; opacity: .7; }
  @keyframes cur { 0%,100% { opacity: 0; } 50% { opacity: .7; } }

  .thinking-wrap { margin-bottom: .6rem; }
  .thinking-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: .3rem; opacity: .85; }
  .thinking-text.streaming-text { color: var(--muted); font-style: italic; font-size: .82rem; }

  form#composer {
    position: relative; z-index: 1;
    flex-shrink: 0;
    padding: 1rem 1.5rem 1.4rem;
    max-width: 760px; width: 100%; margin: 0 auto;
  }
  .input-bar {
    display: flex; align-items: flex-end; gap: .6rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: .5rem .6rem .5rem 1rem;
  }
  textarea {
    flex: 1; resize: none; border: none; outline: none; background: transparent;
    color: var(--text); font: inherit; font-size: .92rem; padding: .4rem 0; max-height: 7rem;
  }
  textarea::placeholder { color: var(--muted); }
  button#send, button#attach {
    width: 36px; height: 36px; border-radius: 50%; border: none; flex-shrink: 0;
    color: #fff; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, opacity .15s;
  }
  button#send { background: var(--bubble-user); }
  button#send:hover:not(:disabled) { background: #4a3fd0; }
  button#send:disabled, button#attach:disabled { opacity: .4; cursor: not-allowed; }
  button#attach { background: var(--chip-bg); border: 1px solid var(--border); color: var(--muted); }
  button#attach:hover:not(:disabled) { background: var(--bubble-agent); color: var(--text); }
  .upload-note { font-size: .68rem; color: var(--muted); padding: .2rem .9rem 0; }

  #confetti-canvas {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 999;
  }
</style>
</head>
<body>
<div class="bg-anim">
  <span class="blob blob1"></span>
  <span class="blob blob2"></span>
  <span class="blob blob3"></span>
  <span class="blob blob4"></span>
</div>
<canvas id="confetti-canvas"></canvas>
<div class="topbar"></div>
<header>
  <h1>CodeAct Agent</h1>
  <span id="meta">loading config…</span>
</header>

<div id="chat">
  <div id="emptyState" class="empty-state">
    <p>Pruébalo con una tarea de ejemplo:</p>
    <div class="suggestion-chips">
      <button type="button" class="chip" data-task="Lista los archivos .go del proyecto y cuenta cuantas lineas tiene cada uno">Listar archivos .go</button>
      <button type="button" class="chip" data-task="Busca la palabra TODO en todos los archivos .go y dime en cuales aparece">Buscar TODO en el código</button>
      <button type="button" class="chip" data-task="Corre go test ./... y dime si todas las pruebas pasan">Correr los tests</button>
      <button type="button" class="chip" data-task="Hola, que puedes hacer?">Saludar</button>
    </div>
  </div>
</div>

<form id="composer">
  <div class="input-bar">
    <button id="attach" type="button" title="Subir un archivo al sandbox">+</button>
    <input id="fileInput" type="file" hidden>
    <textarea id="task" rows="1" placeholder="Describe a task for the agent…"></textarea>
    <button id="send" type="submit" title="Run">&#10148;</button>
  </div>
  <div id="uploadNote" class="upload-note"></div>
</form>

<script>
const chat = document.getElementById('chat');
const meta = document.getElementById('meta');
const sendBtn = document.getElementById('send');
const taskEl = document.getElementById('task');
const form = document.getElementById('composer');
const attachBtn = document.getElementById('attach');
const fileInput = document.getElementById('fileInput');
const uploadNote = document.getElementById('uploadNote');

fetch('/api/info').then(r => r.json()).then(info => {
  meta.textContent = `provider=${info.provider}  model=${info.model}  root=${info.root}`;
}).catch(() => { meta.textContent = '(could not load config)'; });

function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function scrollDown() {
  chat.scrollTop = chat.scrollHeight;
}

// Resaltado de sintaxis ligero para los bloques de código Starlark que se
// muestran en el chat: tokeniza el código ya escapado (no el original) para
// que strings/comentarios con &, < o > sigan siendo HTML seguro.
const starlarkTokenRe = /(#.*$)|("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|\b(def|for|while|if|elif|else|return|in|and|or|not|is|True|False|None|break|continue|lambda)\b|\b(read_file|write_file|append_file|list_dir|mkdir|exists|glob|run_shell|http_get|finish|print|sum|round|len|range|str|int|float|bool|sorted|enumerate)\b|\b(\d+(?:\.\d+)?)\b/gm;

function highlightStarlark(code) {
  return escapeHtml(code).replace(starlarkTokenRe, (m, comment, string, keyword, builtin, number) => {
    if (comment) return `<span class="tok-comment">${comment}</span>`;
    if (string) return `<span class="tok-string">${string}</span>`;
    if (keyword) return `<span class="tok-keyword">${keyword}</span>`;
    if (builtin) return `<span class="tok-builtin">${builtin}</span>`;
    if (number) return `<span class="tok-number">${number}</span>`;
    return m;
  });
}

// --- confeti: una pequeña ráfaga de partículas cada vez que se envía un
// mensaje, puramente decorativo, sin dependencias externas.
const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');
const confettiColors = ['#4f46e5', '#a855f7', '#f59e0b', '#ec4899', '#4ade80', '#fff'];
let confettiParticles = [];
let confettiRunning = false;

function resizeConfettiCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfettiCanvas);
resizeConfettiCanvas();

function triggerConfetti() {
  const originX = window.innerWidth / 2;
  const originY = window.innerHeight - 90;
  for (let i = 0; i < 60; i++) {
    const angle = (Math.PI / 2) + (Math.random() - 0.5) * (Math.PI * 0.8);
    const speed = 6 + Math.random() * 9;
    confettiParticles.push({
      x: originX, y: originY,
      vx: Math.cos(angle) * speed,
      vy: -Math.sin(angle) * speed,
      size: 5 + Math.random() * 5,
      color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
      rotation: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.4,
      life: 0,
      maxLife: 60 + Math.random() * 30,
    });
  }
  if (!confettiRunning) {
    confettiRunning = true;
    requestAnimationFrame(stepConfetti);
  }
}

function stepConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles.forEach(p => {
    p.vy += 0.25; // gravedad
    p.x += p.vx;
    p.y += p.vy;
    p.rotation += p.spin;
    p.life++;
    const alpha = Math.max(0, 1 - p.life / p.maxLife);
    confettiCtx.save();
    confettiCtx.globalAlpha = alpha;
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rotation);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    confettiCtx.restore();
  });
  confettiParticles = confettiParticles.filter(p => p.life < p.maxLife);
  if (confettiParticles.length > 0) {
    requestAnimationFrame(stepConfetti);
  } else {
    confettiRunning = false;
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

function addUserMessage(text) {
  triggerConfetti();
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="bubble-wrap">
      <div class="bubble">${escapeHtml(text)}</div>
      <span class="timestamp">${now()}</span>
    </div>`;
  chat.appendChild(el);
  scrollDown();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg agent typing';
  el.innerHTML = `<div class="avatar">T</div>
    <div class="bubble-wrap"><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
  chat.appendChild(el);
  scrollDown();
  return el;
}

function agentBubble(innerHtml, extraClass) {
  const el = document.createElement('div');
  el.className = 'msg agent';
  el.innerHTML = `<div class="avatar">T</div>
    <div class="bubble-wrap">
      <div class="bubble ${extraClass || ''}">${innerHtml}</div>
      <span class="timestamp">${now()}</span>
    </div>`;
  return el;
}

function addStep(ev, typingEl) {
  let html;
  if (ev.type === 'no_code') {
    html = `<div class="step-label"><span class="dot-status err"></span>Step ${ev.step} · no code block</div>
      <div class="feedback err">The model's reply didn't include a Starlark code block.</div>`;
  } else {
    html = `<div class="step-label"><span class="dot-status ${ev.ok ? 'ok' : 'err'}"></span>Step ${ev.step}</div>
      <div class="code-chip">${highlightStarlark(ev.code)}</div>
      <div class="feedback ${ev.ok ? 'ok' : 'err'}">${escapeHtml(ev.feedback)}</div>`;
  }
  const el = agentBubble(html);
  typingEl.replaceWith(el);
  scrollDown();
}

function addFinal(answer, typingEl) {
  const el = agentBubble(`<div class="step-label"><span class="dot-status ok"></span>Final answer</div>${escapeHtml(answer)}`, 'final');
  typingEl.replaceWith(el);
  scrollDown();
}

function addFailure(message, typingEl) {
  const html = `<div class="step-label"><span class="dot-status err"></span>Stopped</div>${escapeHtml(message)}`;
  const el = agentBubble(html, 'failed');
  if (typingEl) typingEl.replaceWith(el); else chat.appendChild(el);
  scrollDown();
}

async function run(task) {
  addUserMessage(task);
  let typingEl = addTyping();

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task }),
    });
    if (!resp.ok || !resp.body) {
      addFailure(await resp.text(), typingEl);
      return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        typingEl = handle(JSON.parse(line), typingEl);
      }
    }
    if (buf.trim()) handle(JSON.parse(buf), typingEl);
  } catch (e) {
    addFailure(String(e), typingEl);
  }
}

// ensureBubble convierte el bubble de puntos animados, la primera vez que
// llega cualquier evento de streaming, en un contenedor con dos zonas: el
// razonamiento ("thinking", oculto hasta que llegue algo) y la respuesta
// final en tiempo real.
function ensureBubble(typingEl) {
  if (typingEl.classList.contains('typing')) {
    const bubble = typingEl.querySelector('.bubble');
    if (bubble) {
      bubble.innerHTML = `<div class="thinking-wrap" style="display:none">
          <div class="thinking-label">Pensando…</div>
          <div class="thinking-text streaming-text"></div>
        </div>
        <span class="streaming-text"></span>`;
      typingEl.classList.remove('typing');
    }
  }
}

function ensureStreaming(typingEl) {
  ensureBubble(typingEl);
  return typingEl.querySelector('.bubble > .streaming-text');
}

function ensureThinking(typingEl) {
  ensureBubble(typingEl);
  const wrap = typingEl.querySelector('.thinking-wrap');
  if (wrap) wrap.style.display = '';
  return typingEl.querySelector('.thinking-text');
}

function handle(ev, typingEl) {
  if (ev.type === 'thinking') {
    const textEl = ensureThinking(typingEl);
    if (textEl) { textEl.textContent += ev.text; scrollDown(); }
    return typingEl;
  }
  if (ev.type === 'token') {
    const textEl = ensureStreaming(typingEl);
    if (textEl) { textEl.textContent += ev.text; scrollDown(); }
    return typingEl;
  }
  if (ev.type === 'step' || ev.type === 'no_code') {
    addStep(ev, typingEl);
    return addTyping();
  } else if (ev.type === 'done') {
    addFinal(ev.answer, typingEl);
  } else if (ev.type === 'error') {
    addFailure(ev.message, typingEl);
  }
  return typingEl;
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    taskEl.value = chip.dataset.task;
    taskEl.focus();
  });
});

attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  attachBtn.disabled = true;
  uploadNote.textContent = `subiendo ${file.name}…`;
  try {
    const body = new FormData();
    body.append('file', file);
    const resp = await fetch('/api/upload', { method: 'POST', body });
    if (!resp.ok) throw new Error(await resp.text());
    const { filename } = await resp.json();
    uploadNote.textContent = `${filename} subido a la raíz del sandbox — ya puedes pedirle al agente que lo lea.`;
    if (!taskEl.value.trim()) taskEl.value = `Lee el archivo ${filename} y `;
    taskEl.focus();
  } catch (e) {
    uploadNote.textContent = `no se pudo subir ${file.name}: ${e}`;
  } finally {
    attachBtn.disabled = false;
    fileInput.value = '';
  }
});

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const task = taskEl.value.trim();
  if (!task || sendBtn.disabled) return;
  taskEl.value = '';
  sendBtn.disabled = true;
  run(task).finally(() => { sendBtn.disabled = false; taskEl.focus(); });
});
taskEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});
</script>
</body>
</html>
